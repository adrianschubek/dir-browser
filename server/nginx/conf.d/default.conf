# Default server definition
server {
    listen [::]:80 default_server;
    listen 80 default_server;
    server_name _;

    absolute_redirect off;

    root /var/www/html;
    index index.php index.html;

    include  /etc/nginx/mime.types;

    location / {
        include  /etc/nginx/mime.types;
        include fastcgi_params;
        $[if `process.env.BATCH_DOWNLOAD === "true"`]$
        # Allow streaming responses (e.g. ZipStream batch downloads)
        fastcgi_buffering off;
        fastcgi_read_timeout 1h;
        fastcgi_send_timeout 1h;
        send_timeout 1h;
        $[end]$
        $[if `process.env.EXPERIMENTAL_CACHE`]$
        fastcgi_cache cache;
        $[end]$
        $[if `process.env.CORS_ALLOW_ANY_ORIGIN == "true"`]$
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Key" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        $[end]$
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
    }

    location /__internal_public__ {
        include  /etc/nginx/mime.types;
        $[if `process.env.CORS_ALLOW_ANY_ORIGIN == "true"`]$
        add_header Access-Control-Allow-Origin * always;
        $[end]$
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        internal;
        alias /var/www/html/public;
    }
}
